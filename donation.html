<div id="donateModal" class="modal">

  <div class="modal-content">

    <span class="close" onclick="closeDonateModal()">&times;</span>

    <h2 id="donationTitle">Secure Donation</h2>
    <p class="subtitle">Complete your contribution safely</p>

    <!-- STEP INDICATOR -->
    <div class="steps">
      <div class="step active">1. Details</div>
      <div class="step">2. Payment</div>
      <div class="step">3. Confirm</div>
    </div>

    <!-- CURRENCY + AMOUNT -->
    <div class="form-group">
      <label>Currency</label>
      <select id="currency" onchange="updateCurrency()">
        <option value="KES">KES</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="GBP">GBP</option>
      </select>
    </div>

    <div class="form-group">
      <label>Amount</label>
      <input type="number" id="amount" placeholder="Enter amount" />
    </div>

    <!-- PAYMENT METHODS -->
    <div class="payment-methods">
      <button class="method active" onclick="selectMethod('card')">Card</button>
      <button class="method" onclick="selectMethod('mpesa')">M-Pesa</button>
      <button class="method" onclick="selectMethod('paypal')">PayPal</button>
    </div>

    <!-- CARD FORM -->
    <div id="cardForm" class="payment-form active">
      <input type="text" placeholder="Card Number" maxlength="19" />
      <input type="text" placeholder="Cardholder Name" />
      <div class="row">
        <input type="text" placeholder="MM/YY" />
        <input type="text" placeholder="CVC" />
      </div>
    </div>

    <!-- M-PESA -->
    <div id="mpesaForm" class="payment-form">
      <input type="text" placeholder="Phone (2547...)" />
    </div>

    <!-- PAYPAL -->
    <div id="paypalForm" class="payment-form">
      <input type="email" placeholder="PayPal Email" />
    </div>

    <!-- BUTTON -->
    <button class="pay-btn" onclick="submitPayment()">
      Complete Payment
    </button>

  </div>
</div>
<style>
  /* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(2,12,36,0.9);
  backdrop-filter: blur(10px);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* CARD */
.modal-content {
  background: #fff;
  padding: 35px;
  width: 95%;
  max-width: 500px;
  border-radius: 16px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
  animation: fadeIn 0.4s ease;
}

/* TITLE */
h2 {
  font-size: 26px;
  color: #ff2d7a;
}

.subtitle {
  color: #6c7a89;
  margin-bottom: 20px;
}

/* STEPS */
.steps {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.step {
  font-size: 12px;
  color: #aaa;
}

.step.active {
  color: #ff2d7a;
  font-weight: bold;
}

/* FORM */
.form-group {
  margin-bottom: 15px;
}

label {
  font-size: 13px;
  color: #444;
}

input, select {
  width: 100%;
  padding: 12px;
  border: 1px solid #d9e2ec;
  border-radius: 8px;
  margin-top: 5px;
  background: #f9fbfd;
}

/* PAYMENT METHODS */
.payment-methods {
  display: flex;
  gap: 10px;
  margin: 15px 0;
}

.method {
  flex: 1;
  padding: 10px;
  border: none;
  background: #e6edf3;
  border-radius: 8px;
  cursor: pointer;
}

.method.active {
  background: #020c24;
  color: #fff;
}

/* PAYMENT FORMS */
.payment-form {
  display: none;
}

.payment-form.active {
  display: block;
}

/* ROW */
.row {
  display: flex;
  gap: 10px;
}

/* BUTTON */
.pay-btn {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  border: none;
  background: #ff2d7a;
  color: #fff;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
}

.pay-btn:hover {
  background: #3a506b;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
<script>
  function openDonateModal(title) {
  document.getElementById("donateModal").style.display = "flex";
  document.getElementById("donationTitle").innerText = title;
}

function closeDonateModal() {
  document.getElementById("donateModal").style.display = "none";
}

/* SWITCH PAYMENT METHOD */
function selectMethod(method) {
  document.querySelectorAll(".method").forEach(btn => btn.classList.remove("active"));
  document.querySelectorAll(".payment-form").forEach(f => f.classList.remove("active"));

  if (method === "card") {
    document.getElementById("cardForm").classList.add("active");
  }
  if (method === "mpesa") {
    document.getElementById("mpesaForm").classList.add("active");
  }
  if (method === "paypal") {
    document.getElementById("paypalForm").classList.add("active");
  }

  event.target.classList.add("active");
}

/* CURRENCY SWITCH */
function updateCurrency() {
  const currency = document.getElementById("currency").value;
  document.getElementById("amount").placeholder = `Amount (${currency})`;
}

/* PAYMENT HANDLER (PLACEHOLDER) */
function submitPayment() {
  alert("Processing secure payment...");
}
</script>
